name: Code Quality

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

jobs:
  formatting:
    name: Code Formatting (Black & isort)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.13-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Check code formatting with Black
        run: poetry run black --check .

      - name: Check import sorting with isort
        run: poetry run isort --check .

  type-checking:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.13-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies with optional deps (torch for torch_stats)
        run: poetry install --no-interaction --extras ci --with dev

      - name: Run mypy type checking on core modules
        run: |
          poetry run mypy src/dmx/stats/pdist.py \
                          src/dmx/torch_stats/pdist.py \
                          src/dmx/utils/optsutil.py \
                          src/dmx/utils/vector.py

  linting:
    name: Linting (pylint)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.13-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies with optional deps (torch for torch_stats)
        run: poetry install --no-interaction --extras ci --with dev

      - name: Run pylint on core modules
        run: |
          poetry run pylint src/dmx/stats/pdist.py --jobs=1 --fail-under=10
          poetry run pylint src/dmx/torch_stats/pdist.py --jobs=1 --fail-under=10
          poetry run pylint src/dmx/mpi4py --jobs=1 --fail-under=10
          poetry run pylint src/dmx/utils --jobs=1 --fail-under=10
          poetry run pylint src/dmx/torch_utils --jobs=1 --fail-under=10
          poetry run pylint examples --jobs=1 --fail-under=10
          poetry run pylint examples_bstats --jobs=1 --fail-under=10
          poetry run pylint examples_mpi4py --jobs=1 --fail-under=10
          poetry run pylint examples_spark --jobs=1 --fail-under=10
          poetry run pylint examples_torch --jobs=1 --fail-under=10
          poetry run pylint tests/examples --jobs=1 --fail-under=10
          poetry run pylint tests/mpi4py --jobs=1 --fail-under=10
          poetry run pylint tests/stats --jobs=1 --fail-under=10
          poetry run pylint tests/torch_stats --jobs=1 --fail-under=10
          poetry run pylint tests/utils --jobs=1 --fail-under=10

  docstring-quality:
    name: Docstring Quality (pydocstyle)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.13-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies with optional deps (torch for torch_stats)
        run: poetry install --no-interaction --extras ci --with dev

      - name: Run pydocstyle on core modules
        run: |
          poetry run pydocstyle src/dmx/stats/pdist.py \
                               src/dmx/torch_stats/pdist.py \
                               src/dmx/utils/optsutil.py \
                               src/dmx/utils/vector.py
